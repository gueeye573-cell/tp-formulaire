<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>

    <form action="#" method="post">
        <fieldset>
            <legend>Identité</legend>
            <div><label for="Nom">Nom:</label>
                <input type="text" name="Nom" id="Nom" required maxlength="50"> <br> <br>
            </div>

            <div><label for="Prénom">Prénom:</label>
                <input type="text" name="Prénom" id="Prénom" required maxlength="50"> <br> <br>
            </div>

            <div><label for="sex">Sexe:</label>
                <select name="sex" id="sex" required>

                    <option value="Masculin">Masculin</option>
                    <option value="Féminin">Féminin</option>
                    </optgroup>
                </select> <br> <br>


                <div><label for="Date de naissance">Date de naissance:</label>
                    <input type="date" name="Date de naissance" id="Date de naissance" required max="2006-12-31"
                        min="1998-01-01">
                    <br> <br>
                </div>

                <div><label for="pays">Dans quel pays habitez-vous:</label>
                    <select name="pays" id="pays" required>
                        <option value="Senegal">Senegal</option>
                        <option value="France">France</option>
                        <option value="Belgique">Belgique</option>
                        <option value="Suisse">Suisse</option>
                        <option value="Pays-Bas">Pays-Bas</option>
                        <option value="Allemagne">Allemagne</option>
                    </select> <br> <br>
                    <input type="submit" value="S'inscrire">
                </div>
        </fieldset>
    </form> <br> <br>

    <form action="#" method="post">
        <fieldset>
            <legend>contact</legend>
            <label for="Adresse mail">Adresse mail:</label>
            <input type="email" name="Adresse mail" id="Adresse mail" required
                placeholder="confirmer votre adresse mail"> <br> <br>


            <label for="numéro de téléphone">Numéro de téléphone:</label>
            <input type="tel" name="numéro de téléphone" id="numéro de téléphone" required pattern="[0-9]{9}"
                title="Entrez un numéro de téléphone valide (9 chiffres)"> <br> <br>


            <label for="ville">Ville:</label>
            <select name="ville" id="ville" required>
                <option value="Dakar">Dakar</option>
                <option value="Louga">Louga</option>
                <option value="Thies">Thies</option>
                <option value="Kaolack">Kaolack</option>
                <option value="Saint-Louis">Saint-Louis</option>
                <option value="Ziguinchor">Ziguinchor</option>
            </select>
        </fieldset>
    </form> <br> <br>

    <form action="#" method="post">
        <fieldset>
            <legend>Compte et Preferences</legend>
            <label for="Mot de passe">Mot de passe:</label>
            <input type="password" name="Mot de passe" id="Mot de passe" required minlength="8" maxlength="30"
                placeholder="Entrez votre mot de passe"> <br> <br>

            <label for="Confirmer mot de passe">Confirmer mot de passe:</label>
            <input type="password" name="Confirmer mot de passe" id="Confirmer mot de passe" required minlength="8"
                maxlength="30" placeholder="Confirmez votre mot de passe"> <br> <br>
            Langues Reconnues: <br>
            <div> <input type="checkbox" name="html" id="html">
                <label for="html">html</label> <br>
                <input type="checkbox" name="css" id="css">
                <label for="css">css</label> <br>
                <input type="checkbox" name="javascript" id="javascript">
                <label for="javascript">javascript</label> <br>
                <input type="checkbox" name="python" id="python">
                <label for="python">python</label> <br>
                <input type="checkbox" name="PHP" id="PHP">
                <label for="PHP">PHP</label> <br> <br>
            </div>


            <div> <label for="niveau ">Niveau d'experience:</label>
                <input type="range" name="niveau" id="niveau" min="0" max="5" value="1"> <br> <br>
            </div>

            <div> <label for="file">image</label>
                <input type="file" name="file" id="file"> <br> <br>
            </div>

            <div> <label for="bio">Bio:</label> <br>
                <textarea name="bio" id="bio" max="300" placeholder="Ecrivez votre biographie ici..."
                    rows="4"></textarea>
                <br> <br>
            </div>

            <div> <label for="case à cocher">Accepter les conditions d'utilisation:</label>
                <input type="checkbox" name="case à cocher" id="case à cocher" required> <br> <br>
            </div>

            <div> <input type="submit" value="S'inscrire"> </div>
        </fieldset>
    </form>
</body>

</html>
